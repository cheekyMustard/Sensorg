# fly.toml app configuration file generated for sensorg on 2026-03-28T10:32:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sensorg'
primary_region = 'fra'

[build]

[deploy]
  release_command = 'node /app/backend/migrate.js'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
